version: '3.8'

# IP开发平台 - Docker Compose 配置
# 使用方式: docker-compose -f docker-compose.yml up -d

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: ipdev-postgres
    environment:
      POSTGRES_DB: ipdev_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ipdev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: ipdev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ipdev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery Worker (异步任务处理)
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ipdev-celery-worker
    command: celery -A app.main.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ipdev_db
      REDIS_URL: redis://redis:6379/0
      MESHY_API_KEY: ${MESHY_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_cache:/app/models
    networks:
      - ipdev-network
    restart: unless-stopped

  # 后端API服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ipdev-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ipdev_db
      REDIS_URL: redis://redis:6379/0
      MESHY_API_KEY: ${MESHY_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_cache:/app/models
    networks:
      - ipdev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ipdev-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      - backend
    networks:
      - ipdev-network
    restart: unless-stopped

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: ipdev-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ipdev-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  model_cache:

networks:
  ipdev-network:
    driver: bridge
